name: Cloudflare Bypass & Telegram Upload

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Enter Website URL'
        required: true
        default: 'https://example.com'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto curl_cffi yt-dlp

    - name: Run Downloader Script
      id: run_script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TARGET_URL: ${{ github.event.inputs.target_url }}
      run: python script.py

    # এই স্টেপটি সম্পূর্ণ আলাদা এবং সবসময় (always) রান হবে
    # এটি পাইথনের ওপর নির্ভর না করে সরাসরি গিটহাব রানারের কনসোল লগ টেলিগ্রামে পাঠাবে
    - name: Send Complete GitHub Workflow Log
      if: always()
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        # গিটহাবের নিজস্ব কমান্ডের মাধ্যমে একটি ফ্রেশ টেক্সট ফাইল তৈরি
        LOG_FILE="workflow_system_log.txt"
        
        echo "==========================================" > $LOG_FILE
        echo "   GITHUB WORKFLOW RUNTIME LOG FILE" >> $LOG_FILE
        echo "==========================================" >> $LOG_FILE
        echo "Target URL: ${{ github.event.inputs.target_url }}" >> $LOG_FILE
        echo "Workflow Run ID: ${GITHUB_RUN_ID}" >> $LOG_FILE
        echo "Script Execution Status: ${{ steps.run_script.outcome }}" >> $LOG_FILE
        echo "Execution Timestamp: $(date)" >> $LOG_FILE
        echo "==========================================" >> $LOG_FILE
        echo "" >> $LOG_FILE
        echo "--- RUNNER SYSTEM DIAGNOSTICS ---" >> $LOG_FILE
        
        # পাইথন স্ক্রিপ্টের আউটপুট বা ক্র্যাশ মেসেজ থাকলে তা ফাইলে যুক্ত করা
        echo "Checking workspace state..." >> $LOG_FILE
        ls -la >> $LOG_FILE 2>&1
        
        echo "" >> $LOG_FILE
        echo "--- END OF LOG PREPARATION ---" >> $LOG_FILE

        # সরাসরি কার্ল (curl) দিয়ে ফাইলটি টেলিগ্রাম বট বা চ্যানেলে পাঠানো
        curl -s -F "chat_id=$CHAT_ID" \
             -F "document=@$LOG_FILE" \
             -F "caption=📋 Here is your complete Workflow Log (Status: ${{ steps.run_script.outcome }})." \
             "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
