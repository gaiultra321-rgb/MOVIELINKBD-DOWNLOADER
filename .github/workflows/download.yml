name: Cloudflare Bypass & Telegram Upload

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Enter Website URL'
        required: true
        default: 'https://example.com'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # ১. কোড চেকআউট করা
    - name: Checkout Code
      uses: actions/checkout@v4

    # ২. পাইথন সেটআপ এবং টার্মিনাল লগ শুরু
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ৩. ডিপেন্ডেন্সি ইন্সটল এবং এর কনসোল লগ ফাইলে নেওয়া
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip 2>&1 | tee -a workflow_full_log.txt
        pip install pyrogram tgcrypto curl_cffi yt-dlp 2>&1 | tee -a workflow_full_log.txt

    # ৪. পাইথন স্ক্রিপ্ট রান এবং এরোসহ পুরো আউটপুট ওই এক ফাইলে অ্যাপেন্ড (Append) করা
    - name: Run Downloader Script
      id: run_script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TARGET_URL: ${{ github.event.inputs.target_url }}
      run: |
        python script.py 2>&1 | tee -a workflow_full_log.txt

    # ৫. স্ক্রিপ্ট পাস হোক বা ক্র্যাশ করুক—এই স্টেপটি পুরো রানারের টার্মিনাল হিস্ট্রি টেলিগ্রামে পাঠাবে
    - name: Send Complete Workflow Log
      if: always()
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        # সেফটি চেক: যদি কোনো কারণে ফাইল তৈরি না হয়ে থাকে, তবে জেনারেট করে নেওয়া
        if [ ! -f "workflow_full_log.txt" ]; then
          echo "Workflow failed or aborted before logging started." > workflow_full_log.txt
        fi
        
        # সরাসরি অফিশিয়াল টেলিগ্রাম কার্ল মেথড দিয়ে সম্পূর্ণ রিয়েল কনসোল লগ ফাইল পুশ
        curl -F "chat_id=$CHAT_ID" \
             -F "document=@workflow_full_log.txt" \
             -F "caption=📋 Complete Workflow Terminal Log (Status: ${{ steps.run_script.outcome }})." \
             "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
