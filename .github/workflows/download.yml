name: Cloudflare Bypass & Telegram Upload

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Enter Website URL'
        required: true
        default: 'https://example.com'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto curl_cffi yt-dlp

    # এখানে পাইথনের ওপর কোনো 'tee' বা ফাইল রাইটের বোঝা চাপানো হয়নি। সাধারণ রান হবে।
    - name: Run Downloader Script
      id: run_script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TARGET_URL: ${{ github.event.inputs.target_url }}
      run: python script.py

    # পাইথন ক্র্যাশ করলেও এই স্টেপটি গিটহাবের সিস্টেম হিস্ট্রি থেকে সরাসরি টেক্সট ফাইল বানিয়ে পাঠাবে
    - name: Force Send Complete System Log File
      if: always()
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        # গিটহাবের নিজস্ব ডিরেক্টরি স্টেট এবং আউটপুট ডাম্প করা
        echo "=== OFFICIAL GITHUB RUNNER DIAGNOSTIC LOG ===" > final_github_log.txt
        echo "Target URL Visted: ${{ github.event.inputs.target_url }}" >> final_github_log.txt
        echo "Script Main Outcome: ${{ steps.run_script.outcome }}" >> final_github_log.txt
        echo "--------------------------------------------------" >> final_github_log.txt
        echo "Rerunner Environment Variables and Path Check:" >> final_github_log.txt
        env | grep -E "python|Python|PATH" >> final_github_log.txt 2>&1
        echo "--------------------------------------------------" >> final_github_log.txt
        echo "Workspace File Structure at Crash Time:" >> final_github_log.txt
        ls -la >> final_github_log.txt 2>&1
        echo "=== END OF SYSTEM DIAGNOSTICS ===" >> final_github_log.txt
        
        # কার্ল সরাসরি এই হার্ডকোডেড ফাইলটি পাঠাবে, কোনো অবস্থাতেই এটি মিসিং হবে না
        curl -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
             -F chat_id="${CHAT_ID}" \
             -F document=@"final_github_log.txt" \
             -F caption="📋 System Action Log (Status: ${{ steps.run_script.outcome }})"
