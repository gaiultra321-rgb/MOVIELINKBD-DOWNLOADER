name: Cloudflare Bypass & Telegram Upload

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Enter Website URL'
        required: true
        default: 'https://example.com'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto curl_cffi yt-dlp

    - name: Run Downloader Script
      id: run_script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TARGET_URL: ${{ github.event.inputs.target_url }}
      # Shuru theke shesh porjonto shob terminal output workflow_log.txt e save hobe
      run: |
        python script.py 2>&1 | tee workflow_log.txt

    - name: Send Build Log
      if: always()
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        # Apnar dewa oii exact script logic ekhane fix kora holo
        if [ -f "workflow_log.txt" ]; then LOG_FILE="workflow_log.txt";
        elif [ -f "NativeApp/build_log.txt" ]; then LOG_FILE="NativeApp/build_log.txt";
        elif [ -f "build_log.txt" ]; then LOG_FILE="build_log.txt";
        elif [ -f "error_log.txt" ]; then LOG_FILE="error_log.txt";
        else
           echo "Build processing completed/failed before logging started." > fallback_log.txt
           LOG_FILE="fallback_log.txt"
        fi
        
        curl -F "chat_id=$CHAT_ID" \
             -F "document=@$LOG_FILE" \
             -F "caption=Here is your complete Workflow Log (Success/Failure)." \
             "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
