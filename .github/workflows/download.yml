name: Cloudflare Bypass & Telegram Upload

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Enter Website URL'
        required: true
        default: 'https://example.com'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto curl_cffi yt-dlp

    - name: Run Downloader Script
      id: run_script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TARGET_URL: ${{ github.event.inputs.target_url }}
      run: python script.py

    # কোড ফেইল বা সাকসেস যা-ই হোক না কেন, এই স্টেপটি সবসময় রান হবে এবং পুরো লগ ফাইল টেলিগ্রামে পাঠাবে
    - name: Upload Full Workflow Log to Telegram (Always Runs)
      if: always()
      run: |
        # গিটহাবের ইন্টারনাল লগ কালেক্ট করা
        sudo apt-get install -y jq
        
        # লগের জন্য একটি ফাইল তৈরি করা
        echo "=== GITHUB WORKFLOW LOG ===" > workflow_log.txt
        echo "URL Checked: ${{ github.event.inputs.target_url }}" >> workflow_log.txt
        echo "Status of Script: ${{ steps.run_script.outcome }}" >> workflow_log.txt
        echo "=============================" >> workflow_log.txt
        
        # স্ক্রিপ্ট এরর দিলে বা সাকসেস হলে তার লাস্ট টার্মিনাল আউটপুট ফাইলে নেওয়া
        if [ -f script_output.log ]; then
          cat script_output.log >> workflow_log.txt
        else
          echo "No script_output.log found. Script crashed early." >> workflow_log.txt
        fi

        # টেলিগ্রাম বট API দিয়ে সরাসরি .txt ফাইলটি চ্যানেলে পুশ করা (কোনো পাইগ্রাম কোডের ওপর নির্ভর না করে)
        curl -F chat_id="${{ secrets.CHANNEL_ID }}" \
             -F document=@"workflow_log.txt" \
             -F caption="📋 Full Workflow Log File (Status: ${{ steps.run_script.outcome }})" \
             https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
