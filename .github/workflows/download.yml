name: Cloudflare Bypass & Telegram Upload

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Enter Website URL'
        required: true
        default: 'https://example.com'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyrogram tgcrypto curl_cffi yt-dlp

    # পাইথনের নিজের কনসোল আউটপুট সরাসরি টার্মিনাল লগে পুশ করা হচ্ছে
    - name: Run Downloader Script
      id: run_script
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        TARGET_URL: ${{ github.event.inputs.target_url }}
      run: |
        python script.py 2>&1 | tee github_system.log

    # এই স্টেপটি সবসময় রান হবে (স্ক্রিপ্ট সাকসেস হোক বা এরর খাক)
    - name: Upload Complete Workflow Log to Telegram (Always Runs)
      if: always()
      run: |
        # একটি মাস্টার লগ ফাইল তৈরি করা
        echo "=== GITHUB WORKFLOW SYSTEM LOG ===" > workflow_final_log.txt
        echo "Target URL: ${{ github.event.inputs.target_url }}" >> workflow_final_log.txt
        echo "Execution Status: ${{ steps.run_script.outcome }}" >> workflow_final_log.txt
        echo "Timestamp: $(date)" >> workflow_final_log.txt
        echo "======================================" >> workflow_final_log.txt
        
        # পাইথন বা গিটহাবের রিয়েল-টাইম টার্মিনাল লগ যদি থাকে, তা এই ফাইলে ঢুকবে
        if [ -f github_system.log ]; then
          cat github_system.log >> workflow_final_log.txt
        else
          echo "[CRITICAL] Script crashed before generating any console output." >> workflow_final_log.txt
        fi
        
        # সেফটি চেক: ফাইল কোনো কারণে খালি থাকলেও যেন curl ক্র্যাশ না করে
        echo "=== END OF LOG ===" >> workflow_final_log.txt

        # সরাসরি টেলিগ্রাম বট API দিয়ে .txt ফাইলটি চ্যানেলে পুশ করা
        curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument" \
             -F chat_id="${{ secrets.CHANNEL_ID }}" \
             -F document=@"workflow_final_log.txt" \
             -F caption="📋 GitHub Workflow Log (Status: ${{ steps.run_script.outcome }})"
